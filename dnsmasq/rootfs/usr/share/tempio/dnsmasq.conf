# Base dnsmasq config — interface and ranges are patched at runtime by run.sh
# Isolated Matter AP: local DNS only, no upstream resolution (no WAN leak)

bind-interfaces
except-interface=lo
no-resolv
no-poll
bogus-priv
expand-hosts
domain=home

# Do not forward .local / multicast names upstream (breaks mDNS / DNS-SD)
local=/local/
local=/home.arpa/
local=/lan/
local=/home/

# IPv4 DHCP — gateway/DNS point at the AP; nftables blocks exit to LAN/WAN
interface={{ .interface }}
dhcp-authoritative
dhcp-range=192.168.99.10,192.168.99.200,255.255.255.0,12h
dhcp-option=option:router,{{ trimSuffix "/24" .ip_cidr }}
{{ if .override_dns }}
dhcp-option=option:dns-server,{{ .dns_server }}
port=0
{{ else }}
dhcp-option=option:dns-server,{{ trimSuffix "/24" .ip_cidr }}
server= {{ .dns_server }}
{{ end }}
# address=/pool.ntp.org/192.168.99.1
# address=/ntp.org/192.168.99.1
# address=/ntp.org/fd44:44::1


# IPv6 router advertisements + stateful DHCPv6 (Matter needs working IPv6)
enable-ra
dhcp-range=::2,::ff,constructor:{{ .interface }},ra-stateless,slaac,64,12h
ra-param={{ .interface }},high,0,7200 #1800->0 si on veut pas d'access peut etre ?

log-queries
log-facility=-


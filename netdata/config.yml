---
name: Netdata Monitor
version: "1.0.3"
slug: netdata-monitor
description: Real-time host and network monitoring with Netdata (pairs with AP Traffic Monitor)
arch:
  - aarch64
  - amd64
url: "https://github.com/local/ha-ap-traffic-monitor"
startup: services
boot: auto
host_network: true
host_pid: true
host_ipc: true
apparmor: false
init: false
map:
  - addon_config:rw
ingress: true
ingress_port: 19999
ingress_entry: /
webui: "http://[HOST]:[PORT:19999]/"
hassio_role: default
privileged:
  - SYS_ADMIN
  - SYS_PTRACE
  - NET_ADMIN
  - NET_RAW
options:
  netdata_port: 19999
  allow_from: "127.0.0.1 *"
  enable_cloud_claim: false
  claim_token: ""
  claim_rooms: ""
  claim_url: "https://app.netdata.cloud"
  memory_mode: dbengine
  retention_mb: 256
  update_every: 1
  debug: false
schema:
  netdata_port: port
  allow_from: str
  enable_cloud_claim: bool
  claim_token: password?
  claim_rooms: str?
  claim_url: url
  memory_mode: list(dbengine|ram|save|map|none|alloc|static)
  retention_mb: int(64,2048)
  update_every: int(1,60)
  debug: bool